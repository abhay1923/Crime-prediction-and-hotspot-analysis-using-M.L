# ============================================================
# LiveSafe — Nginx Configuration (Production-hardened)
# ============================================================

server {
    # Run on 8080 so container can be non-root
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ---- Security Headers ----
    add_header X-Frame-Options            "DENY"                   always;
    add_header X-Content-Type-Options     "nosniff"                always;
    add_header X-XSS-Protection           "1; mode=block"          always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(self)" always;
    # Strict CSP — tighten further once you audit all inline scripts
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.supabase.co; \
         connect-src 'self' https://*.supabase.co wss://*.supabase.co http://localhost:3000; \
         font-src 'self' data:; \
         frame-ancestors 'none';"
        always;
    # HSTS — TLS is terminated at the upstream load balancer/reverse proxy.
    # This header is forwarded to the browser so it enforces HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ---- Upload limit ----
    client_max_body_size 10M;

    # ---- Health check endpoint (used by Docker/k8s) ----
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Static assets — aggressive caching ----
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- index.html — no cache (so new deploys take effect immediately) ----
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API proxy ----
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
