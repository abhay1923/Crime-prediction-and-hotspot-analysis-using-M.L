# ============================================================
# LiveSafe — nginx TLS Configuration (Production)
#
# TWO deployment modes supported:
#
# Mode A (recommended): TLS terminated by a cloud load balancer
#   (AWS ALB, GCP LB, Cloudflare) — use nginx.conf as-is (port 8080)
#   The LB handles SSL certificates. nginx receives plain HTTP from LB.
#
# Mode B: nginx handles TLS directly (VPS / bare-metal with certbot)
#   Replace nginx.conf with this file and follow setup steps below.
#
# SETUP (Mode B — certbot):
#   1. Install certbot: apt install certbot python3-certbot-nginx
#   2. Get cert: certbot --nginx -d livesafe.yourdomain.com
#   3. certbot auto-renews via systemd timer — verify with:
#        systemctl status certbot.timer
# ============================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name livesafe.yourdomain.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name livesafe.yourdomain.com;

    # ---- TLS Certificates (certbot path) ----
    ssl_certificate     /etc/letsencrypt/live/livesafe.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livesafe.yourdomain.com/privkey.pem;

    # ---- Modern TLS settings (Mozilla Intermediate) ----
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/x-javascript
        application/xml application/rss+xml application/atom+xml
        image/svg+xml font/woff font/woff2;

    # ---- Security Headers ----
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY"                   always;
    add_header X-Content-Type-Options     "nosniff"                always;
    add_header X-XSS-Protection           "1; mode=block"          always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline'; \
         img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.supabase.co; \
         connect-src 'self' https://*.supabase.co wss://*.supabase.co https://livesafe.yourdomain.com; \
         font-src 'self' data:; \
         frame-ancestors 'none';"
        always;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10M;

    # ---- Health check ----
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- Static assets — aggressive caching ----
    location ~* \.(js|css|woff2?|ttf|eot|otf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- index.html — never cache ----
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ---- SPA fallback ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API proxy ----
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ---- Block hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
